monitor = eDP-1, preferred, 0x0, 1

monitor = HDMI-A-1, preferred, auto, 1

workspace = 10, monitor:HDMI-A-1, default:true

$terminal = alacritty
exec-once = $terminal
exec-once = waybar
exec-once = swaybg -i ~/dotfiles/wallpaper.jpg -m fill

debug {
  disable_logs = false
}

input {
  kb_layout = es
  kb_variant = nodeadkeys
  numlock_by_default = true
  repeat_rate = 50
  repeat_delay = 200
}

general {
  col.active_border = rgb(5c47c9)
  border_size = 2
  gaps_out = 10
  gaps_in = 5
}

animations {
  enabled = false
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
}

bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bind = SUPER, Q, exec, alacritty
bind = SUPER, B, exec, firefox

bind = SUPER, X, killactive

bind = SUPER+ALT, H, resizeactive, -60  0
bind = SUPER+ALT, J, resizeactive, 0 60
bind = SUPER+ALT, K, resizeactive, 0 -60
bind = SUPER+ALT, L, resizeactive, 60 0

bind = SUPER+SHIFT, H, movewindow, l
bind = SUPER+SHIFT, J, movewindow, d
bind = SUPER+SHIFT, K, movewindow, u
bind = SUPER+SHIFT, L, movewindow, r

bind = SUPER+SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r

bind = SUPER, T, togglefloating
bind = SUPER, F, fullscreen

bind = SUPER, Tab, cyclenext

bind = SUPER, C, exec, rofi -show drun -theme ~/dotfiles/configs/rofi/colors.rasi

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER+SHIFT, 1, movetoworkspacesilent, 1
bind = SUPER+SHIFT, 2, movetoworkspacesilent, 2
bind = SUPER+SHIFT, 3, movetoworkspacesilent, 3
bind = SUPER+SHIFT, 4, movetoworkspacesilent, 4
bind = SUPER+SHIFT, 5, movetoworkspacesilent, 5
bind = SUPER+SHIFT, 6, movetoworkspacesilent, 6
bind = SUPER+SHIFT, 7, movetoworkspacesilent, 7
bind = SUPER+SHIFT, 8, movetoworkspacesilent, 8
bind = SUPER+SHIFT, 9, movetoworkspacesilent, 9
bind = SUPER+SHIFT, 0, movetoworkspacesilent, 10

bind = SUPER, S, exec, systemctl suspend
